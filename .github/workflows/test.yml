name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  server:
    name: Server (unit + integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm test

  client:
    name: Client (unit + component)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      # jsdom declares an optional canvas@2 peer that conflicts with the app's canvas@3
      # (icon generation); canvas is optional for jsdom, so accept the resolution.
      - run: npm ci --legacy-peer-deps
      - run: npm test
