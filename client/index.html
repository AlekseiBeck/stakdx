<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Standard PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/stakd-logo.png" />

    <!-- iOS PWA — critical for push notifications on iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Stakdx" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />

    <!-- iOS splash screens (optional — improves launch UX) -->
    <meta name="theme-color" content="#f5f5f7" />

    <!-- Theme: apply stored / system preference before paint to avoid a flash.
         Light is the CSS default; only dark needs the attribute. -->
    <script>
      (function () {
        try {
          var k = 'stakdx-theme';
          var t = localStorage.getItem(k);
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', t === 'dark' ? '#0c0c0d' : '#f5f5f7');
        } catch (e) {}
      })();
    </script>

    <!-- Standard meta -->
    <title>Stakdx</title>
    <meta name="description" content="AI-powered swing trading dashboard with real-time stop/target alerts" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" />
    <!-- Clash Display (display) + Satoshi (body) via Fontshare; IBM Plex Mono (data) via Google -->
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
